---
name: Prune Old Packages

'on':
  schedule:
    # Run weekly on Sundays at 2 AM UTC
    - cron: '0 2 * * 0'
  workflow_dispatch:  # Allow manual triggering

concurrency:
  group: rpm-repo-modifications
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  prune:
    runs-on: ubuntu-latest
    steps:
      # Step 1: Checkout gh-pages branch
      - name: Checkout gh-pages branch
        uses: actions/checkout@v4
        with:
          ref: gh-pages
          fetch-depth: 0  # Need full history for git log timestamp lookups

      # Step 2: Sparse checkout of prune-config.yml from main branch
      - name: Fetch prune configuration from main branch
        run: |
          set -euo pipefail

          echo "Fetching prune-config.yml from main branch..."

          # Fetch main branch
          git fetch origin main

          # Extract prune-config.yml from main branch
          if git show origin/main:.github/prune-config.yml > /tmp/prune-config.yml 2>/dev/null; then
            mkdir -p .github
            mv /tmp/prune-config.yml .github/prune-config.yml
            echo "✓ Configuration loaded from main branch"
          else
            echo "::warning::No prune-config.yml found in main branch"
            echo "::warning::Will use default values"
          fi

      # Step 3: Load pruning configuration
      - name: Load pruning configuration
        id: config
        run: |
          set -euo pipefail

          # Default values
          MAX_BRANCHES=2
          MAX_VERSIONS_STABLE=5
          MAX_VERSIONS_TESTING=3

          # Load from config file if it exists
          if [ -f ".github/prune-config.yml" ]; then
            echo "Loading configuration from .github/prune-config.yml"

            # Parse YAML config
            # Strip carriage returns for Windows compatibility
            if grep -q "^max_branches:" .github/prune-config.yml; then
              MAX_BRANCHES=$(grep "^max_branches:" .github/prune-config.yml | \
                  awk '{print $2}' | tr -d '\r')
            fi

            # Parse max_versions for stable
            if grep -A1 "^max_versions:" .github/prune-config.yml | grep -q "stable:"; then
              MAX_VERSIONS_STABLE=$(grep -A1 "^max_versions:" .github/prune-config.yml | \
                  grep "stable:" | awk '{print $2}' | tr -d '\r')
            fi

            # Parse max_versions for testing
            if grep -A2 "^max_versions:" .github/prune-config.yml | grep -q "testing:"; then
              MAX_VERSIONS_TESTING=$(grep -A2 "^max_versions:" .github/prune-config.yml | \
                  grep "testing:" | awk '{print $2}' | tr -d '\r')
            fi

            # Validate configuration values
            if ! [[ "$MAX_BRANCHES" =~ ^[0-9]+$ ]] || [ "$MAX_BRANCHES" -lt 1 ]; then
              echo "::error::Invalid max_branches value: $MAX_BRANCHES"
              echo "::error::Must be a positive integer"
              exit 1
            fi

            if ! [[ "$MAX_VERSIONS_STABLE" =~ ^[0-9]+$ ]] || [ "$MAX_VERSIONS_STABLE" -lt 1 ]; then
              echo "::error::Invalid max_versions.stable value: $MAX_VERSIONS_STABLE"
              echo "::error::Must be a positive integer"
              exit 1
            fi

            if ! [[ "$MAX_VERSIONS_TESTING" =~ ^[0-9]+$ ]] || [ "$MAX_VERSIONS_TESTING" -lt 1 ]; then
              echo "::error::Invalid max_versions.testing value: $MAX_VERSIONS_TESTING"
              echo "::error::Must be a positive integer"
              exit 1
            fi
          else
            echo "No configuration file found, using defaults"
          fi

          echo "Configuration:"
          echo "  max_branches: $MAX_BRANCHES"
          echo "  max_versions.stable: $MAX_VERSIONS_STABLE"
          echo "  max_versions.testing: $MAX_VERSIONS_TESTING"

          echo "MAX_BRANCHES=$MAX_BRANCHES" >> $GITHUB_OUTPUT
          echo "MAX_VERSIONS_STABLE=$MAX_VERSIONS_STABLE" >> $GITHUB_OUTPUT
          echo "MAX_VERSIONS_TESTING=$MAX_VERSIONS_TESTING" >> $GITHUB_OUTPUT

      # Step 4: Install required tools
      - name: Install required tools
        run: |
          set -euo pipefail

          echo "Installing createrepo_c and rpm tools..."
          sudo apt-get update -qq || true
          sudo apt-get install -y createrepo-c rpm libxml2-utils

          echo "✓ Tools installed"

      # Step 5: Prune old distribution branches
      - name: Prune old distribution branches
        id: prune_branches
        run: |
          set -euo pipefail

          MAX_BRANCHES="${{ steps.config.outputs.MAX_BRANCHES }}"
          PRUNED_BRANCHES=""

          # Find all distributions (exclude hidden dirs and the repo/ dir)
          DISTROS=($(find . -mindepth 1 -maxdepth 1 -type d \
            -not -name ".*" \
            -not -name "repo" \
            2>/dev/null | sed 's|^\./||' || true))

          if [ ${#DISTROS[@]} -eq 0 ]; then
            echo "::warning::No distribution directories found, nothing to prune"
            exit 0
          fi

          for DISTRO in "${DISTROS[@]}"; do
            if [ ! -d "$DISTRO" ]; then
              continue
            fi

            echo "Processing distribution: $DISTRO"

            # Find all release branches for this distribution
            BRANCHES=()
            for RELEASE_DIR in "$DISTRO"/*/; do
              if [ ! -d "$RELEASE_DIR" ]; then
                continue
              fi

              RELEASE=$(basename "$RELEASE_DIR")
              BRANCHES+=("$RELEASE")
            done

            # Check if we have branches to process
            if [ ${#BRANCHES[@]} -eq 0 ]; then
              echo "  No branches found for $DISTRO"
              continue
            fi

            echo "  Found ${#BRANCHES[@]} branches: ${BRANCHES[*]}"

            # Sort branches in descending order (newest first)
            # Use version sort to handle both numeric and non-numeric releases
            IFS=$'\n' SORTED_BRANCHES=($(printf '%s\n' "${BRANCHES[@]}" | sort -V -r))
            unset IFS

            echo "  Sorted branches: ${SORTED_BRANCHES[*]}"

            # Determine which branches to keep and which to remove
            KEEP_COUNT=$MAX_BRANCHES
            BRANCHES_TO_REMOVE=()

            for i in "${!SORTED_BRANCHES[@]}"; do
              BRANCH="${SORTED_BRANCHES[$i]}"

              if [ $i -lt $KEEP_COUNT ]; then
                echo "  ✓ Keeping: $DISTRO/$BRANCH"
              else
                echo "  ✗ Removing: $DISTRO/$BRANCH"
                BRANCHES_TO_REMOVE+=("$DISTRO/$BRANCH")
              fi
            done

            # Remove old branches
            for BRANCH_PATH in "${BRANCHES_TO_REMOVE[@]}"; do
              if [ -d "$BRANCH_PATH" ]; then
                echo "  Removing directory: $BRANCH_PATH"
                rm -rf "$BRANCH_PATH"
                PRUNED_BRANCHES="$PRUNED_BRANCHES $BRANCH_PATH"
              fi
            done
          done

          # Save pruned branches for commit message
          echo "PRUNED_BRANCHES=$PRUNED_BRANCHES" >> $GITHUB_OUTPUT

          if [ -n "$PRUNED_BRANCHES" ]; then
            echo "✓ Pruned branches:$PRUNED_BRANCHES"
          else
            echo "✓ No branches needed pruning"
          fi

      # Step 6: Prune old package versions within remaining branches
      - name: Prune old package versions
        id: prune_versions
        run: |
          set -euo pipefail

          MAX_VERSIONS_STABLE="${{ steps.config.outputs.MAX_VERSIONS_STABLE }}"
          MAX_VERSIONS_TESTING="${{ steps.config.outputs.MAX_VERSIONS_TESTING }}"
          PRUNED_PACKAGES=""

          # Process each distribution/release/build_type/arch combination
          # Layout: {distro}/{release}/{build_type}/{arch}
          for ARCH_DIR in */*/*/*/; do
            if [ ! -d "$ARCH_DIR" ]; then
              continue
            fi

            # Extract distro/release/build_type/arch from path
            ARCH_DIR_CLEAN="${ARCH_DIR%/}"
            ARCH=$(basename "$ARCH_DIR_CLEAN")
            BUILD_TYPE_DIR=$(dirname "$ARCH_DIR_CLEAN")
            BUILD_TYPE=$(basename "$BUILD_TYPE_DIR")
            RELEASE_DIR=$(dirname "$BUILD_TYPE_DIR")
            RELEASE=$(basename "$RELEASE_DIR")
            DISTRO_DIR=$(dirname "$RELEASE_DIR")
            DISTRO=$(basename "$DISTRO_DIR")

            # Determine max versions for this build type
            if [ "$BUILD_TYPE" = "stable" ]; then
              MAX_VERSIONS=$MAX_VERSIONS_STABLE
            elif [ "$BUILD_TYPE" = "testing" ]; then
              MAX_VERSIONS=$MAX_VERSIONS_TESTING
            else
              echo "  ::warning::Unknown build_type: $BUILD_TYPE, skipping"
              continue
            fi

            echo "Processing: $DISTRO/$RELEASE/$BUILD_TYPE/$ARCH (max: $MAX_VERSIONS)"

            # Find all RPM files
            RPM_FILES=($(find "$ARCH_DIR_CLEAN" -maxdepth 1 -name "*.rpm" -type f 2>/dev/null || true))

            if [ ${#RPM_FILES[@]} -eq 0 ]; then
              echo "  No RPM files found"
              continue
            fi

            echo "  Found ${#RPM_FILES[@]} RPM files"

            # Group packages by their RPM NAME field.
            # Fix: redirect rpm stderr to /dev/null to prevent signature
            # warnings (e.g. NOKEY) from polluting the captured package name.
            declare -A PACKAGE_GROUPS

            for RPM_FILE in "${RPM_FILES[@]}"; do
              RPM_NAME=$(basename "$RPM_FILE")

              # Query package name; suppress stderr (NOKEY warnings etc.)
              if ! PKG_NAME=$(rpm -qp --queryformat '%{NAME}' "$RPM_FILE" 2>/dev/null); then
                echo "::error::Failed to query RPM package name: $RPM_NAME"
                exit 1
              fi

              # Use the full RPM NAME as the group key.
              # For kmod packages the NAME already encodes the kernel version
              # (e.g. kmod-yeetmouse-6.17.7-ba25.fc43.x86_64), so each
              # kernel variant is naturally its own group — which is correct:
              # we keep the N most recent builds of each kernel variant.
              GROUP_KEY="${PKG_NAME}"

              # Add to group
              if [ -z "${PACKAGE_GROUPS[$GROUP_KEY]:-}" ]; then
                PACKAGE_GROUPS[$GROUP_KEY]="$RPM_FILE"
              else
                PACKAGE_GROUPS[$GROUP_KEY]="${PACKAGE_GROUPS[$GROUP_KEY]} $RPM_FILE"
              fi
            done

            # Process each package group
            for GROUP_KEY in "${!PACKAGE_GROUPS[@]}"; do
              # Get all files belonging to this package name
              PKG_FILES=(${PACKAGE_GROUPS[$GROUP_KEY]})

              # Group files into "builds": one build = one VERSION-RELEASE
              # value, which may include both a binary .rpm and a .src.rpm.
              # Using rpm's own VERSION-RELEASE as the key is unambiguous and
              # avoids fragile filename parsing.
              declare -A BUILD_FILES   # build_key -> "file1 file2 ..."
              declare -A BUILD_TS      # build_key -> commit timestamp

              for PKG_FILE in "${PKG_FILES[@]}"; do
                FNAME=$(basename "$PKG_FILE")

                # Get VERSION-RELEASE; stderr suppressed (NOKEY warnings)
                if ! VR=$(rpm -qp --queryformat '%{VERSION}-%{RELEASE}' \
                    "$PKG_FILE" 2>/dev/null); then
                  echo "::error::Failed to query version for $FNAME"
                  exit 1
                fi

                BUILD_KEY="$VR"

                if [ -z "${BUILD_FILES[$BUILD_KEY]:-}" ]; then
                  BUILD_FILES[$BUILD_KEY]="$PKG_FILE"
                else
                  BUILD_FILES[$BUILD_KEY]="${BUILD_FILES[$BUILD_KEY]} $PKG_FILE"
                fi

                # Use the binary RPM's commit timestamp as the canonical time
                # for this build. src RPMs are often added in a batch commit
                # and share an old timestamp, so the binary timestamp is more
                # representative of when the build was actually published.
                if [[ "$FNAME" != *.src.rpm ]]; then
                  TS=$(git log --diff-filter=A --follow --format="%ct" \
                    -- "$PKG_FILE" 2>/dev/null | tail -1)
                  BUILD_TS[$BUILD_KEY]="${TS:-0}"
                fi
              done

              # Fill in timestamp for any build that only has a src RPM
              for BUILD_KEY in "${!BUILD_FILES[@]}"; do
                if [ -z "${BUILD_TS[$BUILD_KEY]:-}" ]; then
                  for PKG_FILE in ${BUILD_FILES[$BUILD_KEY]}; do
                    TS=$(git log --diff-filter=A --follow --format="%ct" \
                      -- "$PKG_FILE" 2>/dev/null | tail -1)
                    BUILD_TS[$BUILD_KEY]="${TS:-0}"
                    break
                  done
                fi
              done

              BUILD_COUNT=${#BUILD_FILES[@]}

              if [ "$BUILD_COUNT" -le "$MAX_VERSIONS" ]; then
                echo "  ✓ $GROUP_KEY: $BUILD_COUNT builds (within limit)"
                unset BUILD_FILES BUILD_TS
                continue
              fi

              echo "  Processing $GROUP_KEY: $BUILD_COUNT builds (limit: $MAX_VERSIONS)"

              # Sort builds by timestamp descending (newest first)
              TEMP_FILE=$(mktemp)
              for BUILD_KEY in "${!BUILD_TS[@]}"; do
                echo "${BUILD_TS[$BUILD_KEY]} $BUILD_KEY" >> "$TEMP_FILE"
              done

              # Collect the build keys to keep (newest N)
              declare -A KEEP_BUILDS
              while IFS= read -r line; do
                BUILD_KEY="${line#* }"
                KEEP_BUILDS[$BUILD_KEY]=1
              done < <(sort -k1,1rn "$TEMP_FILE" | head -"$MAX_VERSIONS")

              rm -f "$TEMP_FILE"

              # Keep or remove all files belonging to each build
              for BUILD_KEY in "${!BUILD_FILES[@]}"; do
                for PKG_FILE in ${BUILD_FILES[$BUILD_KEY]}; do
                  FILE_NAME=$(basename "$PKG_FILE")
                  if [ -n "${KEEP_BUILDS[$BUILD_KEY]:-}" ]; then
                    echo "    ✓ Keeping: $FILE_NAME"
                  else
                    echo "    ✗ Removing: $FILE_NAME"
                    rm -f "$PKG_FILE"
                    PRUNED_PACKAGES="$PRUNED_PACKAGES $DISTRO/$RELEASE/$BUILD_TYPE/$ARCH/$FILE_NAME"
                  fi
                done
              done

              unset BUILD_FILES BUILD_TS KEEP_BUILDS
            done

            # Clean up associative array for next iteration
            unset PACKAGE_GROUPS
            declare -A PACKAGE_GROUPS
          done

          # Save pruned packages for commit message
          echo "PRUNED_PACKAGES=$PRUNED_PACKAGES" >> $GITHUB_OUTPUT

          if [ -n "$PRUNED_PACKAGES" ]; then
            echo "✓ Pruned packages:$PRUNED_PACKAGES"
          else
            echo "✓ No packages needed pruning"
          fi

      # Step 7: Update metadata for all affected directories
      - name: Update repository metadata
        run: |
          set -euo pipefail

          echo "Updating repository metadata..."

          # Update metadata for all remaining build_type directories
          # New layout: metadata at {distro}/{release}/{build_type} level
          # Process unique build_type directories (not arch subdirectories)
          PROCESSED_DIRS=""

          for ARCH_DIR in */*/*/*/; do
            if [ ! -d "$ARCH_DIR" ]; then
              continue
            fi

            # Extract build_type directory
            ARCH_DIR_CLEAN="${ARCH_DIR%/}"
            BUILD_TYPE_DIR=$(dirname "$ARCH_DIR_CLEAN")

            # Skip if already processed
            if echo "$PROCESSED_DIRS" | grep -q "^$BUILD_TYPE_DIR$"; then
              continue
            fi

            # Check if directory has any RPM files (in any arch subdirectory)
            RPM_COUNT=$(find "$BUILD_TYPE_DIR" -name "*.rpm" -type f 2>/dev/null | wc -l)

            if [ $RPM_COUNT -eq 0 ]; then
              echo "  Skipping $BUILD_TYPE_DIR (no RPM files)"
              continue
            fi

            echo "  Updating metadata: $BUILD_TYPE_DIR"

            # Run createrepo_c at build_type level
            if createrepo_c --update "$BUILD_TYPE_DIR" 2>&1; then
              echo "    ✓ Metadata updated"
            else
              echo "::error::Failed to update metadata for $BUILD_TYPE_DIR"
              exit 1
            fi

            # Validate generated metadata
            if [ -f "$BUILD_TYPE_DIR/repodata/repomd.xml" ]; then
              if xmllint --noout "$BUILD_TYPE_DIR/repodata/repomd.xml" 2>&1; then
                echo "    ✓ Metadata validated"
              else
                echo "::error::Invalid metadata XML in $BUILD_TYPE_DIR"
                exit 1
              fi
            else
              echo "::error::Metadata file not found: $BUILD_TYPE_DIR/repodata/repomd.xml"
              exit 1
            fi

            # Mark as processed
            PROCESSED_DIRS="$PROCESSED_DIRS"$'\n'"$BUILD_TYPE_DIR"
          done

          echo "✓ All metadata updated and validated"

      # Step 8: Regenerate HTML indexes
      - name: Remove old index.html files
        run: |
          echo "Removing existing index.html files to force regeneration..."
          find . -name "index.html" -type f -delete
          echo "✓ Old index.html files removed"

      - name: Regenerate HTML indexes
        uses: jayanta525/github-pages-directory-listing@v4.0.0
        with:
          FOLDER: .

      # Step 9: Commit and push changes
      - name: Commit and push pruning changes
        run: |
          set -euo pipefail

          PRUNED_BRANCHES="${{ steps.prune_branches.outputs.PRUNED_BRANCHES }}"
          PRUNED_PACKAGES="${{ steps.prune_versions.outputs.PRUNED_PACKAGES }}"

          # Configure Git user
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all changes
          git add .

          # Check if there are changes to commit
          if git diff --staged --quiet; then
            echo "::notice::No changes to commit - nothing was pruned"
            exit 0
          fi

          # Build commit message
          COMMIT_MSG="Pruned old packages and branches"

          if [ -n "$PRUNED_BRANCHES" ]; then
            COMMIT_MSG="$COMMIT_MSG"$'\n'"Pruned branches:$PRUNED_BRANCHES"
          fi

          if [ -n "$PRUNED_PACKAGES" ]; then
            # Truncate package list if too long
            PACKAGE_COUNT=$(echo "$PRUNED_PACKAGES" | wc -w)
            if [ $PACKAGE_COUNT -gt 20 ]; then
              PRUNED_PACKAGES_SAMPLE=$(echo "$PRUNED_PACKAGES" | tr ' ' '\n' | head -20 | tr '\n' ' ')
              REMAINING=$((PACKAGE_COUNT - 20))
              COMMIT_MSG="$COMMIT_MSG"$'\n'"Pruned $PACKAGE_COUNT packages (showing first 20):"
              COMMIT_MSG="$COMMIT_MSG"$'\n'"$PRUNED_PACKAGES_SAMPLE"
              COMMIT_MSG="$COMMIT_MSG"$'\n'"... and $REMAINING more"
            else
              COMMIT_MSG="$COMMIT_MSG"$'\n'"Pruned packages:$PRUNED_PACKAGES"
            fi
          fi

          # Show what will be committed
          echo "Changes to be committed:"
          git diff --staged --stat

          echo ""
          echo "Commit message:"
          echo "$COMMIT_MSG"

          # Commit changes
          git commit -m "$COMMIT_MSG"

          # Push to gh-pages branch
          git push origin gh-pages
          echo "✓ Successfully pushed pruning changes"
